name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze

  verify-ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package-manager:
          - cocoapods
          - spm
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null; then
            sudo gem install cocoapods
          fi
      - name: Accept Xcode license
        run: sudo xcodebuild -license accept
      - name: Verify iOS integration
        shell: bash
        run: |
          if [[ "${{ matrix.package-manager }}" == "spm" ]]; then
            flutter config --enable-swift-package-manager
            pushd example/ios
            pod deintegrate
            grep -v 'Pods/Target Support Files/Pods-Runner/Pods-Runner.debug.xcconfig' Flutter/Debug.xcconfig > Flutter/Debug.xcconfig.tmp
            mv Flutter/Debug.xcconfig.tmp Flutter/Debug.xcconfig
            grep -v 'Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig' Flutter/Release.xcconfig > Flutter/Release.xcconfig.tmp
            mv Flutter/Release.xcconfig.tmp Flutter/Release.xcconfig
            popd
          else
            flutter config --no-enable-swift-package-manager
          fi

          flutter pub get
          pushd example
          rm -rf ios/Pods ios/.symlinks ios/Flutter/ephemeral ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
          flutter clean
          flutter pub get
          flutter build ios --simulator --debug
          popd
