name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze

  verify-ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package-manager:
          - cocoapods
          - spm
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null; then
            sudo gem install cocoapods
          fi
      - name: Accept Xcode license
        run: sudo xcodebuild -license accept
      - name: Verify iOS integration
        env:
          FLUTTER_BIN: flutter
        run: ./tool/verify_ios_package_manager.sh ${{ matrix.package-manager }}
